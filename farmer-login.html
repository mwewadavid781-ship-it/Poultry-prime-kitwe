<html lang="en">
<head>

  <title>Farmer Portal — Poultry Prime Kitwe</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    *{box-sizing:border-box} 
    body{font-family:'DM Sans',sans-serif;background:#0d1f16;min-height:100vh;color:#fff}
    .form-label{display:block;font-size:.8rem;font-weight:600;color:#a3c4b0;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
    .form-input{width:100%;padding:13px 16px;border:1.5px solid #2a4a38;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;color:#fff;background:#1a2f22;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,.1)}
    .form-input option{background:#1a2f22}
    .btn-primary{background:linear-gradient(135deg,#013220,#024a31);color:#fff;border:2px solid #4ade80;border-radius:12px;padding:14px 24px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;width:100%;transition:all .2s}
    .btn-primary:hover{background:#024a31;transform:scale(.99)}
    .btn-primary:disabled{background:#374151;border-color:#374151;cursor:not-allowed}
    .btn-danger{background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:8px 14px;font-size:.8rem;font-weight:600;cursor:pointer}
    .btn-toggle{background:#1a2f22;color:#4ade80;border:1px solid #2a4a38;border-radius:8px;padding:8px 14px;font-size:.8rem;font-weight:600;cursor:pointer}
    .batch-row{background:#1a2f22;border:1px solid #2a4a38;border-radius:16px;padding:16px;margin-bottom:12px}
    .tab{padding:10px 18px;border-radius:10px;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;border:none;background:transparent;color:#6b7280;flex:1}
    .tab.active{background:#013220;color:#4ade80;border:1px solid #4ade80}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#013220;color:#fff;border:1px solid #4ade80;padding:12px 20px;border-radius:12px;font-size:.9rem;font-weight:500;z-index:9999;transition:transform .3s ease;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .card{background:#1a2f22;border:1px solid #2a4a38;border-radius:20px;padding:24px}
  </style>
</head>

<!-- LOGIN -->
<div id="login-section" style="max-width:400px;margin:0 auto;padding:40px 20px">
  <div style="text-align:center;margin-bottom:32px">
    <div style="font-size:3rem">🌿</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:#4ade80;margin:12px 0 8px">Farmer Portal</h1>
    <p style="color:#a3c4b0;font-size:.95rem" id="mode-subtitle">Create your free account to list your batches</p>
  </div>
  
  <div class="card">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div>
        <label class="form-label">Email Address</label>
        <input class="form-input" id="login-email" type="email" placeholder="you@example.com"/>
      </div>
      <div>
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input class="form-input" id="login-password" type="password" placeholder="Min. 6 characters" style="padding-right:48px" onkeydown="if(event.key==='Enter') doLogin()"/>
          <button type="button" onclick="togglePassword()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem">👁️</button>
        </div>
      </div>
    </div>
    
    <button class="btn-primary" id="login-btn" onclick="doLogin()" style="margin-top:20px">Create Account</button>
    
    <div style="text-align:center;margin-top:16px">
      <button onclick="toggleMode()" id="mode-toggle" style="background:none;border:none;color:#4ade80;cursor:pointer;font-size:.9rem;text-decoration:underline">Already have an account? Sign In</button>
    </div>
    <p id="login-error" style="color:#f87171;font-size:.85rem;text-align:center;margin-top:12px;display:none"></p>
  </div>
  
  <p style="text-align:center;margin-top:20px">
    <a href="index.html" style="color:#6b7280;font-size:.8rem">← Back to buyer app</a>
  </p>
</div>
