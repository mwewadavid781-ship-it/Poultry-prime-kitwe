<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Farmer Portal - Poultry Prime Kitwe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0a1f10;color:#fff;min-height:100vh}
nav{background:#013220;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
nav h1{color:#4ade80;font-size:1.1rem}
.page{max-width:420px;margin:0 auto;padding:24px 16px}
h2{color:#4ade80;font-size:1.5rem;text-align:center;margin-bottom:6px}
p.sub{color:#a3c4b0;text-align:center;font-size:.9rem;margin-bottom:24px}
.box{background:#1a2f22;border:1px solid #2a4a38;border-radius:16px;padding:20px}
label{display:block;color:#a3c4b0;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;margin-top:14px}
input,select{width:100%;padding:12px 14px;background:#0a1f10;border:1.5px solid #2a4a38;border-radius:10px;color:#fff;font-size:1rem;font-family:sans-serif}
input:focus,select:focus{border-color:#4ade80;outline:none}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:46px}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#a3c4b0}
.btn{width:100%;padding:14px;background:#013220;border:2px solid #4ade80;border-radius:12px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;margin-top:18px;font-family:sans-serif}
.btn:disabled{background:#374151;border-color:#374151;cursor:not-allowed}
.err{color:#f87171;font-size:.85rem;text-align:center;margin-top:10px;display:none}
.link{display:block;text-align:center;color:#4ade80;margin-top:14px;cursor:pointer;font-size:.9rem;text-decoration:underline;background:none;border:none;width:100%;font-family:sans-serif}
.back{display:block;text-align:center;color:#6b7280;margin-top:16px;font-size:.8rem;text-decoration:none}
.tabs{display:flex;gap:6px;margin-bottom:20px}
.tab{flex:1;padding:10px;border-radius:10px;font-weight:700;font-size:.9rem;cursor:pointer;border:1px solid #2a4a38;background:transparent;color:#6b7280;font-family:sans-serif}
.tab.on{background:#013220;color:#4ade80;border-color:#4ade80}
.batch{background:#0a1f10;border:1px solid #2a4a38;border-radius:12px;padding:14px;margin-bottom:10px}
.batch h3{color:#4ade80;font-size:1rem;margin-bottom:4px}
.batch p{color:#a3c4b0;font-size:.8rem}
.row{display:flex;gap:8px;margin-top:10px}
.sm-btn{flex:1;padding:8px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:sans-serif}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#013220;border:1px solid #4ade80;color:#fff;padding:12px 20px;border-radius:12px;font-size:.9rem;z-index:999;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
select option{background:#0a1f10}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<nav>
  <h1>🐓 Poultry Prime Kitwe</h1>
  <button class="sm-btn" id="out-btn" style="display:none;background:#1a2f22;color:#4ade80;border:1px solid #4ade80" onclick="signOut()">Sign Out</button>
</nav>

<!-- LOGIN -->
<div id="pg-login" class="page">
  <h2 style="margin-top:20px">Farmer Portal</h2>
  <p class="sub" id="sub-text">Create a free account to list your chickens</p>
  <div class="box">
    <label>Email Address</label>
    <input type="email" id="em" placeholder="your@email.com"/>
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="pw" placeholder="At least 6 characters"/>
      <button class="eye" onclick="var i=document.getElementById('pw');i.type=i.type=='password'?'text':'password'">👁️</button>
    </div>
    <p class="err" id="err"></p>
    <button class="btn" id="auth-btn" onclick="doAuth()">Create Account</button>
    <button class="link" id="toggle-btn" onclick="toggleMode()">Already registered? Sign In</button>
  </div>
  <a href="index.html" class="back">← Back to buyer app</a>
</div>

<!-- DASHBOARD -->
<div id="pg-dash" class="page" style="display:none">
  <p style="color:#a3c4b0;font-size:.85rem;margin-bottom:16px" id="dash-em"></p>
  <div class="tabs">
    <button class="tab on" id="t1" onclick="goTab(1)">+ Add Batch</button>
    <button class="tab" id="t2" onclick="goTab(2)">My Batches</button>
  </div>

  <div id="p1">
    <div class="box">
      <h2 style="text-align:left;font-size:1.2rem;margin-bottom:4px">List a New Batch</h2>
      <p style="color:#a3c4b0;font-size:.85rem">Fill in your farm details</p>
      <label>Farm Name *</label>
      <input type="text" id="fn" placeholder="e.g. Mwewa Farm"/>
      <label>Location *</label>
      <input type="text" id="fl" placeholder="e.g. Kamfinsa, Kitwe"/>
      <label>Bird Breed *</label>
      <select id="fb">
        <option value="">Select breed...</option>
        <option>Broiler (5-week)</option>
        <option>Broiler (6-week)</option>
        <option>Village Chicken</option>
        <option>Layers (spent)</option>
        <option>Cockerel</option>
        <option>Other</option>
      </select>
      <div class="grid">
        <div><label>Qty Available *</label><input type="number" id="fq" min="1" placeholder="100"/></div>
        <div><label>Price/Bird (K) *</label><input type="number" id="fp" min="1" placeholder="85"/></div>
      </div>
      <label>Ready Date *</label>
      <input type="date" id="fd"/>
      <label>Your WhatsApp</label>
      <input type="tel" id="fw" placeholder="+260 97 ..."/>
      <button class="btn" id="add-btn" onclick="addBatch()">🚀 List My Batch</button>
    </div>
  </div>

  <div id="p2" style="display:none">
    <div id="blist"><p style="color:#6b7280;text-align:center;padding:30px 0">Loading...</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var S = supabase.createClient(
  'https://wirhapusdicoefmgdzyk.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpcmhhcHVzZGljb2VmbWdkenlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjg3NzYsImV4cCI6MjA5MDgwNDc3Nn0.hBetgNjhr83fquQD_LgZ6YFArJ_8bTAjEF9UU5NlPiU'
);
var U = null;
var reg = true;

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}
function err(m){var e=document.getElementById('err');e.textContent=m;e.style.display=m?'block':'none'}

function toggleMode(){
  reg=!reg;
  document.getElementById('auth-btn').textContent=reg?'Create Account':'Sign In';
  document.getElementById('toggle-btn').textContent=reg?'Already registered? Sign In':"New farmer? Create Account";
  document.getElementById('sub-text').textContent=reg?'Create a free account to list your chickens':'Sign in to manage your batches';
  err('');
}

async function doAuth(){
  var email=document.getElementById('em').value.trim();
  var pass=document.getElementById('pw').value;
  err('');
  if(!email||!pass){err('Please enter email and password');return}
  if(pass.length<6){err('Password needs at least 6 characters');return}
  var btn=document.getElementById('auth-btn');
  btn.disabled=true;
  btn.textContent=reg?'Creating...':'Signing in...';
  try{
    var r=reg?await S.auth.signUp({email:email,password:pass}):await S.auth.signInWithPassword({email:email,password:pass});
    if(r.error){err(r.error.message);btn.disabled=false;btn.textContent=reg?'Create Account':'Sign In';return}
    if(r.data&&r.data.user){U=r.data.user;showDash()}
  }catch(e){err('Connection error: '+e.message);btn.disabled=false;btn.textContent=reg?'Create Account':'Sign In'}
}

function showDash(){
  document.getElementById('pg-login').style.display='none';
  document.getElementById('pg-dash').style.display='block';
  document.getElementById('out-btn').style.display='block';
  document.getElementById('dash-em').textContent='Logged in as: '+U.email;
  loadBatches();
}

function signOut(){S.auth.signOut();U=null;document.getElementById('pg-login').style.display='block';document.getElementById('pg-dash').style.display='none';document.getElementById('out-btn').style.display='none'}

function goTab(n){
  document.getElementById('p1').style.display=n==1?'block':'none';
  document.getElementById('p2').style.display=n==2?'block':'none';
  document.getElementById('t1').className='tab'+(n==1?' on':'');
  document.getElementById('t2').className='tab'+(n==2?' on':'');
  if(n==2)loadBatches();
}

async function addBatch(){
  var farm=document.getElementById('fn').value.trim();
  var loc=document.getElementById('fl').value.trim();
  var breed=document.getElementById('fb').value;
  var qty=parseInt(document.getElementById('fq').value);
  var price=parseFloat(document.getElementById('fp').value);
  var date=document.getElementById('fd').value;
  var wa=document.getElementById('fw').value.trim();
  if(!farm||!loc||!breed||!qty||!price||!date){toast('Please fill in all required fields');return}
  var btn=document.getElementById('add-btn');
  btn.disabled=true;btn.textContent='Listing...';
  var r=await S.from('batches').insert({farmer_id:U.id,farmer_email:U.email,farm_name:farm,location:loc,breed:breed,quantity_available:qty,quantity_total:qty,price_per_bird:price,ready_date:date,farmer_whatsapp:wa.replace(/\s+/g,'').replace('+',''),active:true});
  btn.disabled=false;btn.textContent='🚀 List My Batch';
  if(r.error){toast('Error: '+r.error.message);return}
  toast('Batch listed! Buyers can see it now!');
  ['fn','fl','fq','fp','fd','fw'].forEach(function(id){document.getElementById(id).value=''});
  document.getElementById('fb').value='';
  goTab(2);
}

async function loadBatches(){
  var r=await S.from('batches').select('*').eq('farmer_id',U.id).order('created_at',{ascending:false});
  var el=document.getElementById('blist');
  if(r.error||!r.data||!r.data.length){el.innerHTML='<p style="color:#6b7280;text-align:center;padding:30px 0">No batches yet. Add your first one!</p>';return}
  el.innerHTML=r.data.map(function(b){
    return '<div class="batch">'+
      '<h3>'+b.farm_name+'</h3>'+
      '<p>📍 '+b.location+' · '+b.breed+'</p>'+
      '<p>'+b.quantity_available+' birds · K'+b.price_per_bird+'/bird · '+(b.active?'<span style="color:#4ade80">● Live</span>':'<span style="color:#6b7280">○ Paused</span>')+'</p>'+
      '<div class="row">'+
        '<button class="sm-btn" style="background:#1a2f22;color:#4ade80;border:1px solid #2a4a38" onclick="toggleB(\''+b.id+'\','+!b.active+')">'+(b.active?'⏸ Pause':'▶ Resume')+'</button>'+
        '<button class="sm-btn" style="background:#0a1a2f;color:#60a5fa;border:1px solid #1e3a5f" onclick="editB(\''+b.id+'\')">✏️ Edit</button>'+
        '<button class="sm-btn" style="background:#2a0a0a;color:#f87171;border:1px solid #7f1d1d" onclick="deleteB(\''+b.id+'\')">🗑 Delete</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

async function toggleB(id,state){await S.from('batches').update({active:state}).eq('id',id);toast(state?'Batch is Live!':'Batch paused');loadBatches()}
async function deleteB(id){
  if(!confirm('Delete this batch? Cannot be undone.'))return;
  var r=await S.from('batches').delete().eq('id',id);
  if(r.error){toast('Delete failed: '+r.error.message);return}
  toast('Batch deleted!');loadBatches();
}
async function editB(id){
  var r=await S.from('batches').select('*').eq('id',id).single();
  if(r.error){toast('Could not load batch');return}
  var b=r.data;
  var q=prompt('Quantity available (current: '+b.quantity_available+'):',b.quantity_available);
  if(q===null)return;
  var p=prompt('Price per bird in K (current: '+b.price_per_bird+'):',b.price_per_bird);
  if(p===null)return;
  var d=prompt('Ready date YYYY-MM-DD (current: '+b.ready_date+'):',b.ready_date);
  if(d===null)return;
  var upd=await S.from('batches').update({quantity_available:parseInt(q),price_per_bird:parseFloat(p),ready_date:d,active:parseInt(q)>0}).eq('id',id);
  if(upd.error){toast('Update failed: '+upd.error.message);return}
  toast('Batch updated successfully!');loadBatches();
}

S.auth.getSession().then(function(r){if(r.data&&r.data.session&&r.data.session.user){U=r.data.session.user;showDash()}});
</script>
</body>
</html>
